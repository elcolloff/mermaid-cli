name: Build, test and deploy mermaid-cli Docker image
concurrency: ci-${{ github.ref }}
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DOCKERFILE: DockerfileBuild
      IMAGENAME: mermaid-cli
      DOCKER_IO_REPOSITORY: minlag/mermaid-cli
      INPUT_DATA: test-positive
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Mock GitVersion
      run: printf '%s\n' "semVer=1.0.0" >> "$GITHUB_OUTPUT"
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: Checking contents of %s before upload\n' "$INPUT_DATA"
        ls -R "$INPUT_DATA" || printf 'Directory %s not found\n' "$INPUT_DATA"
      continue-on-error: true
    - name: Upload diagrams for manual inspection
      uses: actions/upload-artifact@v4.6.2
      with:
        name: output
        path: ./${{env.INPUT_DATA}}
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
- push
- pull_request
