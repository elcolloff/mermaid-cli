name: Upload to Percy
jobs:
  upload:
    if: |
      ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
    runs-on: ubuntu-latest
    steps:
    - name: Download artifact
      uses: actions/github-script@v8.0.0
      with:
        script: |
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
             owner: context.repo.owner,
             repo: context.repo.repo,
             run_id: ${{github.event.workflow_run.id }},
          });
          const matchArtifact = artifacts.data.artifacts.filter((artifact) => {
            return artifact.name == "output"
          })[0];
          const download = await github.rest.actions.downloadArtifact({
             owner: context.repo.owner,
             repo: context.repo.repo,
             artifact_id: matchArtifact.id,
             archive_format: 'zip',
          });
          const fs = require('fs');
          fs.writeFileSync('${{github.workspace}}/mmdc-output.zip', Buffer.from(download.data));
    - run: unzip mmdc-output.zip
    - name: GARALT debug probe
      run: |-
        printf 'GARALT_DBG: Checking workspace contents after unzip\n'
        ls -R .
        if [ -f package.json ]; then
          printf 'GARALT_DBG: package.json found\n'
          cat package.json
        fi
        if [ -d node_modules ]; then
          printf 'GARALT_DBG: node_modules found\n'
          ls -R node_modules | head -n 20
        fi
      continue-on-error: true
    - name: Upload to Percy
      run: npx @percy/cli upload ./
      env:
        PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        PERCY_PULL_REQUEST: ${{ github.event.workflow_run.pull_requests[0].number }}
        PERCY_COMMIT: ${{ github.event.workflow_run.head_sha }}
        PERCY_BRANCH: ${{ github.event.workflow_run.head_branch }}
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - Build, test and deploy mermaid-cli Docker image
    types:
    - completed
